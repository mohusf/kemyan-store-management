# Render Blueprint — one-click deploy at https://render.com/deploy
# Connect your GitHub repo and Render will provision all services automatically.

databases:
  - name: kemyan-postgres
    plan: free
    databaseName: kemyan_store
    user: kemyan
    postgresMajorVersion: "16"

services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: kemyan-backend
    runtime: node
    plan: starter
    rootDir: apps/backend
    buildCommand: npm install && npx tsc
    startCommand: node dist/main.js
    healthCheckPath: /api/v1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DB_HOST
        fromDatabase:
          name: kemyan-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: kemyan-postgres
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: kemyan-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: kemyan-postgres
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: kemyan-postgres
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://kemyan-frontend.onrender.com

  # ── Frontend SPA ─────────────────────────────────────────────
  - type: web
    name: kemyan-frontend
    runtime: static
    plan: starter
    rootDir: apps/frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://kemyan-backend.onrender.com
