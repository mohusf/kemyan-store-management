# Render Blueprint — backend + database only
# Frontend deploys to Vercel (better free tier, no sleep, global CDN)

databases:
  - name: kemyan-postgres
    plan: free
    databaseName: kemyan_store
    user: kemyan
    postgresMajorVersion: "16"

services:
  - type: web
    name: kemyan-backend
    runtime: docker
    plan: free
    dockerfilePath: apps/backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DB_HOST
        fromDatabase:
          name: kemyan-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: kemyan-postgres
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: kemyan-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: kemyan-postgres
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: kemyan-postgres
          property: database
      - key: DATABASE_URL
        fromDatabase:
          name: kemyan-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: "24h"
      - key: CORS_ORIGINS
        value: "*"
