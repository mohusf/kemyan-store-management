# Render Blueprint — one-click deploy at https://render.com/deploy
# Connect your GitHub repo and Render will provision all services automatically.

databases:
  - name: kemyan-postgres
    plan: free
    databaseName: kemyan_store
    user: kemyan
    postgresMajorVersion: "16"

services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: kemyan-backend
    runtime: docker
    plan: starter
    dockerfilePath: apps/backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DB_HOST
        fromDatabase:
          name: kemyan-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: kemyan-postgres
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: kemyan-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: kemyan-postgres
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: kemyan-postgres
          property: database
      - key: DATABASE_URL
        fromDatabase:
          name: kemyan-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: "24h"
      - key: CORS_ORIGINS
        value: https://kemyan-frontend.onrender.com

  # ── Frontend SPA ─────────────────────────────────────────────
  - type: web
    name: kemyan-frontend
    runtime: static
    plan: starter
    rootDir: apps/frontend
    buildCommand: cd ../.. && npm ci --workspace=apps/frontend --workspace=packages/shared --include-workspace-root && npm run build -w apps/frontend
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /api/*
        destination: https://kemyan-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://kemyan-backend.onrender.com/api/v1
